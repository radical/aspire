# Executes all the tests on all the platforms
name: Tests

on:
  pull_request:
    branches:
      - main
      - 'release/**'

  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Duplicated jobs so their dependencies are not blocked on both the
  # setup jobs

  create_check:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Create Check
        id: checkrun                    # An ID to allow the step to be referenced
        env:
          GH_TOKEN: ${{ github.token }} # Expose the token for GH CLI
        run: |
          CHECKID=$(gh api -X POST -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f name='Super Check' \
            -f head_sha='${{ github.event.pull_request.head.sha }}' \
            -f status='queued' \
            -f 'output[title]=Tests summary' \
            -f 'output[summary]=A *fancy* summary' \
            -f 'output[text]=More detailed Markdown **text**' \
            --jq '.id' \
            /repos/${{ github.repository }}/check-runs)

          ####################################################
          # Put the ID into a step variable
          ####################################################

          echo "checkId=$CHECKID" >> $GITHUB_OUTPUT

  setup_for_tests_lin:
    name: Setup for tests (Linux)
    if: ${{ github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    outputs:
      integrations_tests_matrix: ${{ steps.generate_tests_matrix.outputs.integrations_tests_matrix }}
      templates_tests_matrix: ${{ steps.generate_tests_matrix.outputs.templates_tests_matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/enumerate-tests
        id: generate_tests_matrix
        with:
          includeIntegrations: true
          includeTemplates: true

  # setup_for_tests_win:
  #   name: Setup for tests (Windows)
  #   if: ${{ github.repository_owner == 'dotnet' }}
  #   runs-on: windows-latest
  #   outputs:
  #     integrations_tests_matrix: ${{ steps.generate_tests_matrix.outputs.integrations_tests_matrix }}
  #     templates_tests_matrix: ${{ steps.generate_tests_matrix.outputs.templates_tests_matrix }}
  #   steps:
  #     - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

  #     - uses: ./.github/actions/enumerate-tests
  #       id: generate_tests_matrix
  #       with:
  #         includeIntegrations: true
  #         includeTemplates: true

  build_packages:
    name: Build packages
    if: ${{ github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build with packages
        env:
          CI: false
        run: ./build.sh -restore -build -ci -pack /bl /p:InstallBrowsersForPlaywright=false /p:SkipTestProjects=true

      - name: Upload built NuGets
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: built-nugets
          path: artifacts/packages

  integrations_test_lin:
    uses: ./.github/workflows/run-tests.yml
    name: Integrations Linux
    needs: setup_for_tests_lin
    strategy:
      fail-fast: false
      matrix:
        ${{ fromJson(needs.setup_for_tests_lin.outputs.integrations_tests_matrix) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: "ubuntu-latest"
      extraTestArgs: "--filter-not-trait \"quarantined=true\""

  # integrations_test_win:
  #   uses: ./.github/workflows/run-tests.yml
  #   name: Integrations Windows
  #   needs: setup_for_tests_win
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       ${{ fromJson(needs.setup_for_tests_win.outputs.integrations_tests_matrix) }}
  #   with:
  #     testShortName: ${{ matrix.shortname }}
  #     os: "windows-latest"
  #     extraTestArgs: "--filter-not-trait \"quarantined=true\""

  #templates_test_lin:
    #name: Templates Linux
    #uses: ./.github/workflows/run-tests.yml
    #needs: [setup_for_tests_lin, build_packages]
    #strategy:
      #fail-fast: false
      #matrix: ${{ fromJson(needs.setup_for_tests_lin.outputs.templates_tests_matrix) }}
    #with:
      #testShortName: ${{ matrix.shortname }}
      #os: "ubuntu-latest"
      #testProjectPath: tests/Aspire.Templates.Tests/Aspire.Templates.Tests.csproj
      #testSessionTimeout: 20m
      #testHangTimeout: 12m
      #extraTestArgs: "--filter-not-trait quarantined=true --filter-class Aspire.Templates.Tests.${{ matrix.shortname }}"
      #requiresNugets: true
      #requiresTestSdk: true

  #templates_test_win:
    #name: Templates Windows
    #uses: ./.github/workflows/run-tests.yml
    #needs: [setup_for_tests_win, build_packages]
    #strategy:
      #fail-fast: false
      #matrix: ${{ fromJson(needs.setup_for_tests_win.outputs.templates_tests_matrix) }}
    #with:
      #testShortName: ${{ matrix.shortname }}
      #os: "windows-latest"
      #testProjectPath: tests/Aspire.Templates.Tests/Aspire.Templates.Tests.csproj
      #testSessionTimeout: 20m
      #testHangTimeout: 12m
      #extraTestArgs: "--filter-not-trait quarantined=true --filter-class Aspire.Templates.Tests.${{ matrix.shortname }}"
      #requiresNugets: true
      #requiresTestSdk: true

  endtoend_tests:
    name: EndToEnd ${{ matrix.os }}
    uses: ./.github/workflows/run-tests.yml
    needs: build_packages
    with:
      testShortName: EndToEnd
      # EndToEnd is not run on Windows due to missing Docker support
      os: ubuntu-latest
      testProjectPath: tests/Aspire.EndToEnd.Tests/Aspire.EndToEnd.Tests.csproj
      requiresNugets: true

  results: # This job is used for branch protection. It ensures all the above tests passed
    if: ${{ always() && github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    permissions:
      checks: write
    name: Final Results
    needs: [ create_check, integrations_test_lin, endtoend_tests ]
    steps:
      # get all the test-job-result* artifacts into a single directory
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: test-job-result-*
          merge-multiple: true
          path: test-job-result

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-ubuntu-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/ubuntu-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-windows-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/windows-latest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: All-TestResults
          path: ${{ github.workspace }}/testresults/**/*.trx

      - name: Generate test results summary
        if: always()
        shell: pwsh
        run: |
          $testResults = Get-ChildItem -Path ${{ github.workspace }}/testresults/**/*.trx
          $overallTotalTestCount = 0
          $overallPassedTestCount = 0
          $overallFailedTestCount = 0
          $overallSkippedTestCount = 0
          $markdown = ""

          $markdown += "<table>"
          $testResults | ForEach-Object {
            try {
              # Load the .trx file as XML
              [xml]$trx = Get-Content $_.FullName

              # Extract test run summary
              $totalTestCount += [int]$trx.TestRun.ResultSummary.Counters.total
              $overallTotalTestCount += [int]$trx.TestRun.ResultSummary.Counters.total

              $passedTestCount += [int]$trx.TestRun.ResultSummary.Counters.passed
              $overallPassedTestCount += [int]$trx.TestRun.ResultSummary.Counters.passed

              $failedTestCount += [int]$trx.TestRun.ResultSummary.Counters.failed
              $overallFailedTestCount += [int]$trx.TestRun.ResultSummary.Counters.failed

              $skippedTestCount += [int]($trx.TestRun.ResultSummary.Counters.executed - $trx.TestRun.ResultSummary.Counters.passed - $trx.TestRun.ResultSummary.Counters.failed)
              $overallSkippedTestCount += [int]($trx.TestRun.ResultSummary.Counters.executed - $trx.TestRun.ResultSummary.Counters.passed - $trx.TestRun.ResultSummary.Counters.failed)

              $markdown += "<th width=`"99999"">✓&nbsp;&nbsp;Passed</th>"
              $markdown += "<th width=`"99999"">✘&nbsp;&nbsp;Failed</th>"
              $markdown += "<th width=`"99999"">↷&nbsp;&nbsp;Skipped</th>"
              $markdown += "<th width=`"99999"">∑&nbsp;&nbsp;Total</th>"
              $markdown += "<th width=`"99999"">⧗&nbsp;&nbsp;Elapsed</th>"
              $markdown += "<tr>"
              $markdown += "<td align=`"center"">$passedTestCount</td>"
              $markdown += "<td align=`"center"">$failedTestCount</td>"
              $markdown += "<td align=`"center"">$skippedTestCount</td>"
              $markdown += "<td align=`"center"">$totalTestCount</td>"
              $markdown += "<td align=`"center"">$elapsedTimeFormatted</td>"
              $markdown += "</tr>""
            } catch {
              Write-Warning "Failed to process file: $_.FullName"
            }
          }
          $markdown += "</table>`n"

          Write-Output "Total Tests: $totalTestCount"
          Write-Output "Passed Tests: $passedTestCount"
          Write-Output "Failed Tests: $failedTestCount"
          Write-Output "Skipped Tests: $skippedTestCount"

          $overallSummary = "# Overall Summary`n"
          $overallSummary += "<table>"
          $overallSummary += "<th width=`"99999"">✓&nbsp;&nbsp;Passed</th>"
          $overallSummary += "<th width=`"99999"">✘&nbsp;&nbsp;Failed</th>"
          $overallSummary += "<th width=`"99999"">↷&nbsp;&nbsp;Skipped</th>"
          $overallSummary += "<th width=`"99999"">∑&nbsp;&nbsp;Total</th>"
          $overallSummary += "<tr>"
          $overallSummary += "<td align=`"center"">$overallPassedTestCount</td>"
          $overallSummary += "<td align=`"center"">$overallFailedTestCount</td>"
          $overallSummary += "<td align=`"center"">$overallSkippedTestCount</td>"
          $overallSummary += "<td align=`"center"">$overallTotalTestCount</td>"
          $overallSummary += "</tr></table>`n"

          Set-Content -Path $env:GITHUB_STEP_SUMMARY -Value $markdown

      - name: Repository Dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ##########################################################
          # Create a repository_dispatch event of type my-check
          # Send the SHA and the Check Run ID in the client_payload
          ##########################################################

          gh api -X POST -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f 'event_type=my-check' \
            -f 'client_payload[checkRunId]=${{ needs.create_check.steps.checkrun.outputs.checkId }}' \
            -f 'client_payload[sha]=${{ github.sha }}' \
            /repos/${{ github.repository }}/dispatches

      # return success if zero result-failed-* files are found
      - name: Compute result
        run: |
          [ 0 -eq $(find test-job-result -name 'result-failed-*' | wc -l) ]
